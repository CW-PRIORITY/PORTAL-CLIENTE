<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority+ | Central Wings</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-principal: #050505;
            --fondo-tarjeta: #121212;
            --borde-tarjeta: #2A2A2A;
            --verde-cw: #2E4C3B;
            --verde-brillo: #4A7A5E;
            --verde-neon: #00C853; /* Para el resplandor premium */
            --texto-blanco: #F0F0F0;
            --texto-gris: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--fondo-principal);
            color: var(--texto-blanco);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .contenedor-app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 25px; }

        /* --- EFECTO PREMIUM EN LOGOS --- */
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--borde-tarjeta); }
        .header img {
            max-width: 220px;
            height: auto;
            /* Filtro de luz premium para el logo principal */
            filter: drop-shadow(0 0 12px rgba(46, 76, 59, 0.8)) brightness(1.1);
        }

        .saludo-vip { margin-top: 10px; }
        .saludo-vip h1 { font-weight: 300; font-size: 24px; }
        .saludo-vip span { font-weight: 800; color: var(--texto-blanco); }

        .etiqueta-priority {
            display: inline-block;
            background: linear-gradient(135deg, var(--verde-cw), #111);
            color: var(--texto-blanco);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 8px;
            border: 1px solid var(--verde-brillo);
            box-shadow: 0 0 10px rgba(74, 122, 94, 0.3);
        }

        .dashboard-card {
            background-color: var(--fondo-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .dashboard-card::before {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 100px; height: 100px; background: var(--verde-cw);
            filter: blur(60px); opacity: 0.5;
        }

        /* --- NUEVO LAYOUT DE ESTADÍSTICAS Y GRÁFICAS --- */
        .estadisticas-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .dato-dinero { display: flex; flex-direction: column; }
        .dato-dinero span.titulo { font-size: 12px; color: var(--texto-gris); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .dato-dinero span.valor { font-size: 32px; font-weight: 700; text-shadow: 0 0 15px rgba(74, 122, 94, 0.4); }
        .dato-dinero span.valor span.simbolo { font-size: 20px; color: var(--verde-brillo); }

        /* Contenedor de las Donas */
        .graficas-visitas { display: flex; gap: 15px; }
        .grafica-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .grafica-titulo { font-size: 9px; color: var(--texto-gris); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        
        /* Gráfica Circular (Conic Gradient) */
        .donut-chart {
            width: 55px; height: 55px;
            border-radius: 50%;
            /* El --porcentaje se controla en el HTML inline */
            background: conic-gradient(var(--verde-brillo) var(--porcentaje), #1A1A1A 0);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.6), inset 0 0 8px rgba(0,0,0,0.8);
        }
        
        /* El hueco del centro */
        .donut-hole {
            width: 43px; height: 43px;
            border-radius: 50%;
            background-color: var(--fondo-tarjeta);
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .donut-hole span { font-size: 16px; font-weight: 800; color: var(--texto-blanco); }

        /* --- BOTÓN CON EFECTO DE REFLEJO --- */
        .menu-secreto-btn {
            background-color: #151515;
            color: var(--texto-blanco);
            border: 1px solid var(--verde-brillo);
            padding: 15px; width: 100%; border-radius: 12px;
            font-size: 13px; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            position: relative; overflow: hidden; /* Necesario para que la luz no se salga */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .menu-secreto-btn:hover { background-color: var(--verde-cw); box-shadow: 0 0 20px rgba(74,122,94,0.6); }

        .menu-secreto-btn img {
            width: 20px; height: 20px;
            /* Filtro premium a la estrella */
            filter: drop-shadow(0 0 5px var(--verde-neon));
        }

        /* Animación de la luz pasando */
        .menu-secreto-btn::after {
            content: ''; position: absolute; top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: reflejo-luz 3.5s infinite;
        }

        @keyframes reflejo-luz {
            0% { left: -150%; }
            50% { left: 200%; }
            100% { left: 200%; }
        }

        /* --- HISTORIAL --- */
        .historial { margin-top: 10px; }
        .historial h3 { font-size: 13px; color: var(--texto-gris); margin-bottom: 15px; letter-spacing: 1px; }
        .item-historial { display: flex; justify-content: space-between; padding: 15px; background-color: var(--fondo-tarjeta); border-radius: 12px; margin-bottom: 10px; border: 1px solid #1A1A1A; transition: transform 0.2s ease; }
        .item-historial:hover { transform: translateY(-2px); border-color: var(--borde-tarjeta); }
        .item-izq span.fecha { display: block; font-size: 14px; font-weight: 700; }
        .item-izq span.sucursal { font-size: 12px; color: var(--texto-gris); }
        .item-der { color: var(--verde-brillo); font-weight: 700; }
    </style>
</head>
<body>

    <div class="contenedor-app">
        <div class="header">
            <img src="CW_VDEOSC_HORIZONTAL.png" alt="Central Wings Logo">
        </div>

        <div class="saludo-vip">
            <h1>Qué onda, <span>Alejandro</span></h1>
            <div class="etiqueta-priority">PRIORITY+</div>
        </div>

        <div class="dashboard-card">
            
            <div class="estadisticas-container">
                <div class="dato-dinero">
                    <span class="titulo">Alitas-Pesos</span>
                    <span class="valor"><span class="simbolo">$</span>450<span class="simbolo">.00</span></span>
                </div>
                
                <div class="graficas-visitas">
                    <div class="grafica-item">
                        <div class="donut-chart mes" style="--porcentaje: 75%;">
                            <div class="donut-hole"><span>3</span></div>
                        </div>
                        <span class="grafica-titulo">Mes</span>
                    </div>
                    
                    <div class="grafica-item">
                        <div class="donut-chart total" style="--porcentaje: 100%;">
                            <div class="donut-hole"><span>12</span></div>
                        </div>
                        <span class="grafica-titulo">Totales</span>
                    </div>
                </div>
            </div>
            
            <button class="menu-secreto-btn">
                <img src="ICON_ESTRELLACW_VDEOSC.png" alt="Estrella">
                DESBLOQUEAR MENÚ SECRETO
            </button>
        </div>

        <div class="historial">
            <h3>ÚLTIMOS MOVIMIENTOS</h3>
            
            <div class="item-historial">
                <div class="item-izq">
                    <span class="fecha">Ayer</span>
                    <span class="sucursal">Sucursal Altacia</span>
                </div>
                <div class="item-der">+$45.00</div>
            </div>

            <div class="item-historial">
                <div class="item-izq">
                    <span class="fecha">12 Oct 2026</span>
                    <span class="sucursal">Sucursal Altacia</span>
                </div>
                <div class="item-der">+$82.50</div>
            </div>
        </div>
    </div>
</body>
</html>
